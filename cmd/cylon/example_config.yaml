# Cylon bootstrap configuration.
#
# Only server/bootstrap settings live here. Runtime data (gateway identity,
# tags, sessions) lives in the SQLite database and is managed via the UI/API.
#
# Precedence: environment (CYLON_*) > this file > built-in defaults.
# Example env override: CYLON_SERVER_HTTP_LISTEN=":9090"

server:
  http_listen: ":8080"      # UI + API + /ws
  metrics_listen: ":9100"   # Prometheus
  log_level: info           # debug | info | warning | error

store:
  path: /var/lib/cylon/cylon.db   # mapped volume; SQLite database file
  events_retention: 10000         # cap traffic events kept (0 = unlimited)

gateway:
  tcp_listen: ":6000"             # tags connect here over TCP
  eui: ""                         # empty => generate on first run and persist
  lns_url: ""                     # LNS WebSocket URL; empty => gateway disabled (health only).
                                  # e.g. ws://127.0.0.1:7000 for mock-lns
  connection:
    creds_dir: /etc/cylon/creds   # mapped volume; Basic Station credential layout

sim:
  realtime: true

# Secrets are provided via environment, never this file:
#   CYLON_DB_KEY        column encryption key for secrets at rest
#   CYLON_GATEWAY_EUI   override the gateway EUI
